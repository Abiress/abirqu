<!DOCTYPE html>
<html>
<head>
    <title>AbirQu Quantum SDK - WebAssembly Demo</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h1 { color: #333; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #output { margin-top: 20px; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>AbirQu Quantum SDK - WebAssembly Demo</h1>
    <p>Quantum simulator running in your browser via WebAssembly!</p>
    
    <button onclick="runBellState()">Run Bell State</button>
    <button onclick="runSingleQubit()">Run Single Qubit (H)</button>
    <button onclick="runRotation()">Run Rotation (RX(π))</button>
    
    <div id="output"></div>
    
    <script type="module">
        import init, { WasmSimulator } from './pkg/abirqu_core_wasm.js';
        
        // Initialize the WASM module
        const abirqu = await init();
        
        window.runBellState = function() {
            const sim = WasmSimulator.create_bell_state();
            const probs = sim.get_probabilities();
            
            let html = '<h3>Bell State Probabilities:</h3>';
            html += '<pre>' + JSON.stringify(probs, null, 2) + '</pre>';
            html += '<p>|00> and |11> should be ~0.5 each</p>';
            
            document.getElementById('output').innerHTML = html;
            
            sim.free();
        };
        
        window.runSingleQubit = function() {
            const sim = new WasmSimulator(1);
            sim.h(0);
            const probs = sim.get_probabilities();
            
            let html = '<h3>Single Qubit (H|0>):</h3>';
            html += '<pre>' + JSON.stringify(probs, null, 2) + '</pre>';
            html += '<p>Should be 50% |0> and 50% |1></p>';
            
            document.getElementById('output').innerHTML = html;
            
            sim.free();
        };
        
        window.runRotation = function() {
            const sim = new WasmSimulator(1);
            sim.rx(0, Math.PI);
            const probs = sim.get_probabilities();
            
            let html = '<h3>Rotation (RX(π)|0>):</h3>';
            html += '<pre>' + JSON.stringify(probs, null, 2) + '</pre>';
            html += '<p>Should be 100% |1></p>';
            
            document.getElementById('output').innerHTML = html;
            
            sim.free();
        };
        
        console.log('AbirQu WASM module loaded successfully!');
    </script>
</body>
</html>
