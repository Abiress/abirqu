name: Build Desktop App

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Linux dependencies
      if: matrix.platform == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

    - name: Install cross-compilation tools (aarch64)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      working-directory: gui
      run: npm ci

    - name: Build frontend
      working-directory: gui
      run: npm run build

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tauriScript: npx tauri
        args: --target ${{ matrix.target }}

    - name: Upload Linux artifacts
      if: matrix.platform == 'ubuntu-22.04' && matrix.target == 'x86_64-unknown-linux-gnu'
      uses: actions/upload-artifact@v4
      with:
        name: linux-x64
        path: |
          gui/src-tauri/target/release/bundle/deb/*.deb
          gui/src-tauri/target/release/bundle/rpm/*.rpm
          gui/src-tauri/target/release/bundle/appimage/*.AppImage

    - name: Upload Linux ARM artifacts
      if: matrix.platform == 'ubuntu-22.04' && matrix.target == 'aarch64-unknown-linux-gnu'
      uses: actions/upload-artifact@v4
      with:
        name: linux-arm64
        path: |
          gui/src-tauri/target/release/bundle/deb/*.deb
          gui/src-tauri/target/release/bundle/rpm/*.rpm

    - name: Upload Windows artifacts
      if: matrix.platform == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64
        path: |
          gui/src-tauri/target/release/bundle/msi/*.msi
          gui/src-tauri/target/release/bundle/nsis/*.exe

    - name: Upload macOS ARM artifacts
      if: matrix.platform == 'macos-latest' && matrix.target == 'aarch64-apple-darwin'
      uses: actions/upload-artifact@v4
      with:
        name: macos-arm64
        path: |
          gui/src-tauri/target/release/bundle/dmg/*.dmg
          gui/src-tauri/target/release/bundle/macos/*.app

    - name: Upload macOS Intel artifacts
      if: matrix.platform == 'macos-latest' && matrix.target == 'x86_64-apple-darwin'
      uses: actions/upload-artifact@v4
      with:
        name: macos-x64
        path: |
          gui/src-tauri/target/release/bundle/dmg/*.dmg
          gui/src-tauri/target/release/bundle/macos/*.app

  release:
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          linux-x64/**
          linux-arm64/**
          windows-x64/**
          macos-arm64/**
          macos-x64/**
