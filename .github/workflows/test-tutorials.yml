name: Test Tutorials

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  count-tutorials:
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.count.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - id: count
        run: echo "total=$(ls tutorials/*.md | grep -v INDEX.md | wc -l)" >> "$GITHUB_OUTPUT"

  tutorial-batch:
    needs: count-tutorials
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - start: 1
            end: 50
            label: "1-50"
          - start: 51
            end: 100
            label: "51-100"
          - start: 101
            end: 150
            label: "101-150"
          - start: 151
            end: 200
            label: "151-200"
          - start: 201
            end: 250
            label: "201-250"

    name: "Tutorials ${{ matrix.label }}"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tutorial batch ${{ matrix.start }}-${{ matrix.end }}
        run: python tests/test_tutorials.py ${{ matrix.start }} ${{ matrix.end }}

  # Run pytest discovery as a separate job to validate all tutorials at once
  pytest-tutorials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tutorial tests via pytest
        run: pytest tests/test_tutorials.py -v --tb=short
