name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests
      run: |
        python -m pytest tests/ -x -q --tb=short

    - name: Test README code blocks
      run: |
        python tests/test_readme.py

    - name: Test tutorials (batch 1-50)
      run: |
        python tests/test_tutorials.py 1 50

    - name: Verify PyPI build
      run: |
        python -m build
        twine check dist/*

  test-tutorials:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -e .

    - name: Run tutorials (batch 1-100)
      run: |
        python tests/test_tutorials.py 1 100

  validate-algorithms:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -e .

    - name: Validate Grover search
      run: |
        python -c "
        from abirqu.library import grover_circuit
        from abirqu.primitives import QuantumRun

        for n in [2, 3]:
            target = 2**n - 1
            circuit = grover_circuit(num_qubits=n, target=target)
            circuit.measure_all()
            result = QuantumRun(circuit, shots=1000)
            target_str = bin(target)[2:].zfill(n)
            count = result.counts.get(target_str, 0)
            assert count > 800, f'Grover n={n}: {count}/1000 (expected >800)'
            print(f'Grover n={n}: {count}/1000 PASS')
        print('All Grover tests passed!')
        "

    - name: Validate GHZ state
      run: |
        python -c "
        from abirqu.library import ghz_circuit
        from abirqu.primitives import QuantumRun

        circuit = ghz_circuit(num_qubits=4)
        circuit.measure_all()
        result = QuantumRun(circuit, shots=1000)
        counts = result.counts
        assert '0000' in counts and counts['0000'] > 400
        assert '1111' in counts and counts['1111'] > 400
        print(f'GHZ: {counts}')
        print('GHZ test passed!')
        "

    - name: Validate Bell state
      run: |
        python -c "
        from abirqu import Circuit
        from abirqu.primitives import QuantumRun

        circuit = Circuit(2)
        circuit.h(0)
        circuit.cnot(0, 1)
        circuit.measure_all()
        result = QuantumRun(circuit, shots=1000)
        counts = result.counts
        assert '00' in counts and counts['00'] > 400
        assert '11' in counts and counts['11'] > 400
        print(f'Bell: {counts}')
        print('Bell state test passed!')
        "

  test-bindings:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Rust core
      run: cargo build --release --no-default-features

    - name: Test Go binding
      run: |
        export LD_LIBRARY_PATH=$PWD/target/release:$LD_LIBRARY_PATH
        cd go/abirqu && go test ./...

    - name: Test JavaScript binding
      run: |
        cd js && node tests/run-tests.js

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Test Java binding
      run: |
        export LD_LIBRARY_PATH=$PWD/target/release:$LD_LIBRARY_PATH
        curl -sL -o /tmp/jna.jar https://repo1.maven.org/maven2/net/java/dev/jna/jna/5.14.0/jna-5.14.0.jar
        javac -cp "/tmp/jna.jar" -d /tmp/jb java/src/main/java/com/abirqu/*.java java/TestAbirQu.java
        java -cp "/tmp/jb:/tmp/jna.jar" -Djna.library.path=$PWD/target/release TestAbirQu

    - name: Test Kotlin binding
      run: |
        export LD_LIBRARY_PATH=$PWD/target/release:$LD_LIBRARY_PATH
        curl -sL -o /tmp/jna.jar https://repo1.maven.org/maven2/net/java/dev/jna/jna/5.14.0/jna-5.14.0.jar
        kotlinc -cp "/tmp/jna.jar" -d /tmp/ktc /tmp/KtCheck.kt kotlin/src/main/kotlin/com/abirqu/*.kt 2>/dev/null || true
        # Run a quick runtime check
        cat > /tmp/KtCheck.kt <<'EOF'
        import com.abirqu.AbirQuSimulator
        fun main() {
            val sim = AbirQuSimulator(2)
            sim.h(0); sim.cnot(0, 1)
            val p = sim.getProbabilities()
            println(if (Math.abs(p[0]-0.5)<1e-6 && Math.abs(p[3]-0.5)<1e-6) "KOTLIN OK" else "KOTLIN FAIL")
            sim.close()
        }
        EOF
        kotlinc -cp "/tmp/jna.jar" -d /tmp/ktc /tmp/KtCheck.kt kotlin/src/main/kotlin/com/abirqu/*.kt
        kotlin -cp "/tmp/ktc:/tmp/jna.jar" -Djna.library.path=$PWD/target/release KtCheckKt

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Test .NET binding
      run: |
        export LD_LIBRARY_PATH=$PWD/target/release:$LD_LIBRARY_PATH
        cd dotnet && dotnet test tests/AbirQu.Tests.csproj

    - name: Install Swift
      run: |
        curl -sL https://download.swift.org/swift-6.1-release/ubuntu2404/swift-6.1-RELEASE/swift-6.1-RELEASE-ubuntu24.04.tar.gz -o /tmp/swift.tar.gz
        tar xzf /tmp/swift.tar.gz -C /tmp
        echo "/tmp/swift-6.1-RELEASE-ubuntu24.04/usr/bin" >> $GITHUB_PATH
        sudo apt-get update && sudo apt-get install -y libxml2-dev

    - name: Test Swift binding
      run: |
        export LD_LIBRARY_PATH=$PWD/target/release:$LD_LIBRARY_PATH
        cd swift && swift test

  publish:
    needs: [test, validate-algorithms, test-bindings]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install build tools
      run: |
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Publish to PyPI
      if: env.PYPI_TOKEN != ''
      env:
        PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      run: |
        TWINE_USERNAME=__token__ TWINE_PASSWORD=$PYPI_TOKEN twine upload dist/*
